<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poetry — Bryan Wang</title>
  <script>
    (function(){
      var t = localStorage.getItem('bw-theme');
      if(t !== 'light') document.documentElement.setAttribute('data-theme','dark');
    })();
  </script>
  <style>

    :root {
      --bg:    #F7F6F3;
      --ink:   #0A0A0A;
      --mid:   #888580;
      --rule:  #E0DDD8;
      --font:  "Helvetica Neue", Helvetica, Arial, sans-serif;
      --nav-h: 56px;
    }

    html[data-theme="dark"] {
      --bg:   #0D0D0D;
      --ink:  #F0EDE8;
      --mid:  #F0EDE8;
      --rule: #252525;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background .25s, color .25s;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: var(--nav-h);
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      transition: background .25s, border-color .25s;
    }

    nav .nw {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .nav-name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .01em;
      text-decoration: none;
      color: var(--ink);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #888580;
      text-decoration: none;
      transition: color .15s;
      white-space: nowrap;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--ink); }

    #theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: #888580;
      transition: color .15s;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    #theme-toggle:hover { color: var(--ink); }
    #theme-toggle svg { width: 18px; height: 18px; display: block; }

    .pw {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 0 40px;
      padding-top: calc(var(--nav-h) + 64px);
      padding-bottom: 80px;
    }

    .page-title {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 500;
      letter-spacing: -.025em;
      line-height: 1;
      margin-bottom: 56px;
      color: var(--ink);
      opacity: 0;
      animation: up .7s ease forwards .1s;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    .main-table {
      width: 100%;
      border-collapse: collapse;
      opacity: 0;
      animation: up .7s ease forwards .2s;
    }

    .main-table thead th {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #888580;
      text-align: left;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--rule);
    }

    .main-table tbody tr {
      border-bottom: 1px solid var(--rule);
      transition: background .15s;
    }

    .main-table tbody tr:hover { background: rgba(128,128,128,.06); }

    .main-table td {
      padding: 18px 0;
      vertical-align: top;
    }

    .td-co-name {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -.01em;
      display: block;
      color: var(--ink);
    }

    .td-co-name a {
      text-decoration: none;
      color: var(--ink);
    }

    .td-co-name a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .td-sub, .td-focus, .td-yr {
      font-size: 12px;
      color: var(--mid);
      line-height: 1.6;
    }

    .td-yr { text-align: right; white-space: nowrap; }

    .site-footer {
      border-top: 1px solid var(--rule);
      padding: 20px 0;
      transition: border-color .25s;
      flex-shrink: 0;
    }

    .site-footer .fw {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .f-left {
      font-size: 12px;
      color: #888580;
      white-space: nowrap;
    }

    .f-socials { display: flex; gap: 18px; align-items: center; }

    .f-social {
      display: flex;
      align-items: center;
      color: #888580;
      text-decoration: none;
      transition: opacity .15s;
      opacity: .65;
    }

    .f-social:hover { opacity: 1; }

    .f-social svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
      display: block;
    }

    .f-social-beli img {
      width: 17px;
      height: 17px;
      object-fit: cover;
      display: block;
      border-radius: 3px;
      filter: grayscale(1) brightness(0);
      opacity: .55;
      transition: opacity .15s;
    }

    html[data-theme="dark"] .f-social-beli img {
      filter: grayscale(1) brightness(0) invert(1);
    }

    .f-social-beli:hover img { opacity: 1; }

    @media(max-width: 768px) {
      nav .nw { padding: 0 20px; }
      .pw { padding-left: 20px; padding-right: 20px; padding-top: calc(var(--nav-h) + 40px); }
      .site-footer .fw { padding-left: 20px; padding-right: 20px; }
      .nav-links { gap: 16px; }
      .nav-links a { font-size: 11px; letter-spacing: .04em; }
      .nav-right { gap: 16px; }
    }

    @media(max-width: 600px) {
      .main-table, .main-table thead, .main-table tbody,
      .main-table th, .main-table td, .main-table tr { display: block; }
      .main-table thead { display: none; }
      .main-table tbody tr { padding: 20px 0; border-bottom: 1px solid var(--rule); }
      .main-table td { padding: 0; text-align: left !important; }
      .td-co-name { font-size: 15px; margin-bottom: 6px; }
      .td-sub, .td-focus { display: block; margin-top: 4px; padding-right: 0; }
      .td-yr { display: inline-block; margin-top: 8px; text-align: left !important; }
      .hide-mobile { display: none !important; }
    }


    .poem-list { list-style: none; opacity: 0; animation: up .7s ease forwards .2s; }
    .poem-item { border-bottom: 1px solid var(--rule); }
    .poem-item:first-child { border-top: 1px solid var(--rule); }
    .poem-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      text-decoration: none;
      color: var(--ink);
      gap: 16px;
      transition: opacity .15s;
    }
    .poem-link:hover { opacity: .45; }
    .poem-link:hover .p-arrow { opacity: 1; transform: translateX(0); }
    .p-title { font-size: 17px; font-weight: 400; letter-spacing: -.01em; color: var(--ink); }
    .p-arrow {
      font-size: 13px;
      color: var(--mid);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
      flex-shrink: 0;
    }
    @media(max-width:600px) { .p-title { font-size: 15px; } }

  </style>

  <script>
    (function(){
      var btn = document.getElementById('theme-toggle');
      var SUN = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      var MOON = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      function update(){
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        btn.innerHTML = dark ? SUN : MOON;
        btn.setAttribute('aria-label', dark ? 'Light mode' : 'Dark mode');
      }
      btn.addEventListener('click', function(){
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        if(dark){
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('bw-theme','light');
        } else {
          document.documentElement.setAttribute('data-theme','dark');
          localStorage.setItem('bw-theme','dark');
        }
        update();
      });
      update();
    })();
  </script>
